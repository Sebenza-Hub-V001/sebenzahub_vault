name: Daily Vault Update Email

on:
  schedule:
    # 4:00 AM SAST = 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for diff

      - name: Generate vault update summary
        id: summary
        run: |
          # Get changes from the last 24 hours
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          TODAY=$(date -u '+%A, %d %B %Y')
          
          echo "date=$TODAY" >> $GITHUB_OUTPUT
          
          # Get commits from last 24 hours
          COMMITS=$(git log --since="$SINCE" --pretty=format:"• %s (%an, %ar)" 2>/dev/null)
          COMMIT_COUNT=$(git log --since="$SINCE" --oneline 2>/dev/null | wc -l)
          
          # Get file changes
          CHANGED_FILES=$(git diff --name-status $(git log --since="$SINCE" --format="%H" | tail -1)..HEAD 2>/dev/null || echo "")
          
          # Categorize changes by vault folder
          ADDED=$(echo "$CHANGED_FILES" | grep "^A" | awk '{print $2}' || true)
          MODIFIED=$(echo "$CHANGED_FILES" | grep "^M" | awk '{print $2}' || true)
          DELETED=$(echo "$CHANGED_FILES" | grep "^D" | awk '{print $2}' || true)
          
          ADDED_COUNT=$(echo "$ADDED" | grep -c . 2>/dev/null || echo "0")
          MODIFIED_COUNT=$(echo "$MODIFIED" | grep -c . 2>/dev/null || echo "0")
          DELETED_COUNT=$(echo "$DELETED" | grep -c . 2>/dev/null || echo "0")
          
          # Build the email body
          {
            echo 'body<<EMAILEOF'
            echo "<!DOCTYPE html><html><body style='font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 600px; margin: 0 auto; color: #333;'>"
            echo "<h2 style='color: #5C4EE5;'>📋 Sebenza Hub Vault — Daily Update</h2>"
            echo "<p style='color: #666;'>$TODAY</p>"
            echo "<hr style='border: 1px solid #eee;'>"
            
            if [ "$COMMIT_COUNT" -eq "0" ]; then
              echo "<p>✅ <strong>No changes in the last 24 hours.</strong> The vault is up to date.</p>"
            else
              echo "<h3>📊 Summary</h3>"
              echo "<ul>"
              echo "<li><strong>$COMMIT_COUNT</strong> commit(s) in the last 24 hours</li>"
              echo "<li><strong>$ADDED_COUNT</strong> file(s) added</li>"
              echo "<li><strong>$MODIFIED_COUNT</strong> file(s) modified</li>"
              echo "<li><strong>$DELETED_COUNT</strong> file(s) deleted</li>"
              echo "</ul>"
              
              echo "<h3>📝 Commits</h3>"
              echo "<ul>"
              echo "$COMMITS" | while read -r line; do
                [ -n "$line" ] && echo "<li>$line</li>"
              done
              echo "</ul>"
              
              if [ -n "$ADDED" ] && [ "$ADDED_COUNT" -gt "0" ]; then
                echo "<h3>🆕 New Files</h3><ul>"
                echo "$ADDED" | while read -r f; do
                  [ -n "$f" ] && echo "<li>$f</li>"
                done
                echo "</ul>"
              fi
              
              if [ -n "$MODIFIED" ] && [ "$MODIFIED_COUNT" -gt "0" ]; then
                echo "<h3>✏️ Modified Files</h3><ul>"
                echo "$MODIFIED" | while read -r f; do
                  [ -n "$f" ] && echo "<li>$f</li>"
                done
                echo "</ul>"
              fi
              
              if [ -n "$DELETED" ] && [ "$DELETED_COUNT" -gt "0" ]; then
                echo "<h3>🗑️ Deleted Files</h3><ul>"
                echo "$DELETED" | while read -r f; do
                  [ -n "$f" ] && echo "<li>$f</li>"
                done
                echo "</ul>"
              fi
            fi
            
            echo "<hr style='border: 1px solid #eee;'>"
            echo "<p style='font-size: 12px; color: #999;'>This is an automated report from <a href='https://github.com/Sebenza-Hub-V001/sebenzahub_vault'>Sebenza Hub Vault</a>.</p>"
            echo "</body></html>"
            echo 'EMAILEOF'
          } >> $GITHUB_OUTPUT

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "📋 Vault Update — ${{ steps.summary.outputs.date }}"
          to: Wes.dutoit@sebenzahub.co.za
          from: ${{ secrets.SMTP_USERNAME }}
          html_body: ${{ steps.summary.outputs.body }}
          content_type: text/html
